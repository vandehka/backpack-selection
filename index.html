<!DOCTYPE html>
<html>
<head>
  <title>Backpack Selection</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      padding: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .card.selected {
      border-color: #1BA0D7;
    }

    img {
      max-width: 100%;
      height: 200px;
      object-fit: contain;
    }

    textarea {
      width: 100%;
      max-width: 1000px;
      display: block;
      margin: 40px auto 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      display: block;
      margin: auto;
      padding: 14px 30px;
      background: #1BA0D7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<form action="https://formspree.io/f/xzdyrrjq" method="POST">

  <input type="hidden" name="Backpack Choice" id="backpack_choice">

  <div class="grid">
    <div class="card" onclick="selectCard(this, 'OGIO Shuttle')">
      <img src="Ogio.png">
    </div>

    <div class="card" onclick="selectCard(this, 'Dyno')">
      <img src="Dyno.png">
    </div>

    <div class="card" onclick="selectCard(this, 'Fall Line')">
      <img src="Fallline.png">
    </div>

    <div class="card" onclick="selectCard(this, 'Mercur')">
      <img src="Mercur.png">
    </div>

    <div class="card" onclick="selectCard(this, 'Commuter')">
      <img src="Commuter.png">
    </div>
  </div>

  <textarea name="Shipping Address" placeholder="Enter mailing address" required></textarea>

  <button type="submit">Submit</button>

</form>

<script>
  function selectCard(element, name) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    element.classList.add('selected');
    document.getElementById('backpack_choice').value = name;
  }
</script>

</body>
</html>
