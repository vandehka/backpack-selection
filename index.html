<!DOCTYPE html>
<html>
<head>
  <title>Backpack Selection</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 50px 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.10);
    }

    .card.selected {
      border-color: #1BA0D7;
      box-shadow: 0 0 0 4px rgba(27,160,215,0.15);
    }

    .card img {
      max-width: 100%;
      height: 190px;
      object-fit: contain;
    }

    textarea {
      width: 100%;
      margin-top: 40px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccd6dd;
      font-size: 14px;
      resize: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }

    textarea:focus {
      outline: none;
      border-color: #1BA0D7;
      box-shadow: 0 0 0 3px rgba(27,160,215,0.15);
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1BA0D7, #0f6cbd);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 16px rgba(15,108,189,0.25);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15,108,189,0.35);
    }

    .selected-indicator {
      margin-top: 10px;
      font-size: 12px;
      color: #1BA0D7;
      font-weight: 600;
      opacity: 0;
    }

    .card.selected .selected-indicator {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

<form action="https://formspree.io/f/xzdyrrjq" method="POST">

  <input type="hidden" name="Backpack Choice" id="backpack_choice">

  <div class="grid">
    <div class="card" onclick="selectCard(this, 'OGIO Shuttle')">
      <img src="Ogio.png">
      <div class="selected-indicator">Selected</div>
    </div>

    <div class="card" onclick="selectCard(this, 'Dyno')">
      <img src="Dyno.png">
      <div class="selected-indicator">Selected</div>
    </div>

    <div class="card" onclick="selectCard(this, 'Fall Line')">
      <img src="Fallline.png">
      <div class="selected-indicator">Selected</div>
    </div>

    <div class="card" onclick="selectCard(this, 'Mercur')">
      <img src="Mercur.png">
      <div class="selected-indicator">Selected</div>
    </div>

    <div class="card" onclick="selectCard(this, 'Commuter')">
      <img src="Commuter.png">
      <div class="selected-indicator">Selected</div>
    </div>
  </div>

  <textarea name="Shipping Address" placeholder="Enter mailing address" rows="4" required></textarea>

  <button type="submit">Submit</button>

</form>

</div>

<script>
  function selectCard(element, name) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    element.classList.add('selected');
    document.getElementById('backpack_choice').value = name;
  }
</script>

</body>
</html>
